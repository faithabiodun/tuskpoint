<svg viewBox="0 0 680 540" role="img" xmlns="http://www.w3.org/2000/svg">
<title>TuskPoint icon mark</title>
<desc>A glowing curved tusk that resolves into a radiant data checkpoint at its tip</desc>
<defs>
  <radialGradient id="halo" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff7a3c" stop-opacity="0.45"/>
    <stop offset="45%" stop-color="#ff5a1f" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#ff5a1f" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="ivory" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fdfaf2"/>
    <stop offset="40%" stop-color="#e6dcc6"/>
    <stop offset="78%" stop-color="#bcae8e"/>
    <stop offset="100%" stop-color="#8a7a56"/>
  </linearGradient>
  <linearGradient id="ivorySheen" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="#ffffff" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="core" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="30%" stop-color="#ffd9b0"/>
    <stop offset="65%" stop-color="#ff6b2c"/>
    <stop offset="100%" stop-color="#e8390a"/>
  </radialGradient>
  <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff7a3c" stop-opacity="0"/>
    <stop offset="100%" stop-color="#ff7a3c" stop-opacity="0.85"/>
  </linearGradient>
</defs>

<circle cx="430" cy="330" r="200" fill="url(#halo)"/>

<g transform="translate(340,270)">
  <ellipse cx="-40" cy="120" rx="150" ry="26" fill="#000000" opacity="0.18"/>
  <path d="M -185 -30 C -150 -95, 30 -110, 120 -38 C 165 -2, 178 38, 184 66" fill="none" stroke="url(#ivory)" stroke-width="30" stroke-linecap="round"/>
  <path d="M -185 -30 C -150 -95, 30 -110, 120 -38 C 165 -2, 178 38, 184 66" fill="none" stroke="url(#ivorySheen)" stroke-width="11" stroke-linecap="round" transform="translate(-2,-5)"/>
  <path d="M -150 -55 C -90 -88, 30 -92, 90 -52" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <g opacity="0.85">
    <circle cx="-120" cy="-58" r="3" fill="#ff7a3c"/>
    <circle cx="-40" cy="-78" r="3.4" fill="#ff7a3c"/>
    <circle cx="55" cy="-62" r="3.8" fill="#ff7a3c"/>
    <circle cx="125" cy="-22" r="4.4" fill="#ff7a3c"/>
  </g>
  <path d="M 90 -50 C 130 -14, 162 24, 184 66" fill="none" stroke="url(#trail)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="2 7"/>
  <circle cx="184" cy="66" r="46" fill="url(#halo)"/>
  <circle cx="184" cy="66" r="22" fill="#ff5a1f" opacity="0.25"/>
  <circle cx="184" cy="66" r="13" fill="url(#core)"/>
  <circle cx="180" cy="61" r="3.5" fill="#ffffff" opacity="0.95"/>
  <g stroke="#ff7a3c" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <line x1="184" y1="38" x2="184" y2="28"/>
    <line x1="184" y1="94" x2="184" y2="104"/>
    <line x1="212" y1="66" x2="222" y2="66"/>
    <line x1="156" y1="66" x2="146" y2="66"/>
    <line x1="204" y1="46" x2="211" y2="39"/>
    <line x1="164" y1="86" x2="157" y2="93"/>
  </g>
</g>
</svg>
